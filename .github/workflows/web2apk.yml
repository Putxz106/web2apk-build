name: Web2APK Build

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: "Alamat Website"
        required: true
      app_name:
        description: "Nama Aplikasi"
        required: true
      icon_url:
        description: "URL Icon"
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependency
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk wget unzip imagemagick

      - name: Download Template
        run: |
          set -e

          wget -O template.zip https://github.com/mgks/Android-WebView-App/archive/refs/heads/master.zip || \
          wget -O template.zip https://github.com/mgks/Android-WebView-App/archive/refs/heads/main.zip

          unzip template.zip

          DIR=$(find . -maxdepth 1 -type d -name "Android-WebView-App-*")

          if [ -z "$DIR" ]; then
            echo "Template tidak ditemukan!"
            ls -la
            exit 1
          fi

          mv "$DIR" android-project

      - name: Ubah Data Aplikasi
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
          APP_URL: ${{ github.event.inputs.web_url }}
          APP_ID: com.putxz.apk
        run: |
          cd android-project

          find . -name strings.xml -exec sed -i "s|Android WebView App|$APP_NAME|g" {} \;

          FILE=$(find . -name MainActivity.java | head -n1)

          if [ -n "$FILE" ]; then
            sed -i "s|https://example.com|$APP_URL|g" "$FILE"
          fi

      - name: Pasang Icon
        if: ${{ github.event.inputs.icon_url != '' }}
        run: |
          cd android-project

          wget "${{ github.event.inputs.icon_url }}" -O icon.png

          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi
          do
            mkdir -p app/src/main/res/$dir
            convert icon.png -resize 512x512 app/src/main/res/$dir/ic_launcher.png
          done

      - name: Build APK
        run: |
          cd android-project
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Web2APK
          path: android-project/app/build/outputs/apk/release/*.apk
