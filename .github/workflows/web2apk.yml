name: Flutter Web2APK Build

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
      app_name:
        description: 'Nama Aplikasi'
        required: true
      icon_url:
        description: 'URL Icon'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Inject & Build
        run: |
          # Ganti URL di main.dart saja
          sed -i "s|URL_WEB_DISINI|${{ github.event.inputs.web_url }}|g" lib/main.dart
          
          # Download Icon
          curl -L "${{ github.event.inputs.icon_url }}" -o assets/app_icon.png
          
          # Build
          flutter pub get
          flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
