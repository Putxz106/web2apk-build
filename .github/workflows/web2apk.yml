name: Flutter Web2APK Build

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
      app_name:
        description: 'Nama Aplikasi'
        required: true
      icon_url:
        description: 'URL Icon'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Generate & Inject & Build
        run: |
          # 1. Buat proyek baru karena repo kosong
          flutter create my_app
          cd my_app
          
          # 2. Hapus isi main.dart bawaan dan ganti dengan WebView sederhana
          # (Ini cara paling praktis tanpa harus punya file main.dart di repo)
          cat <<EOF > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          void main() => runApp(MaterialApp(home: Scaffold(body: SafeArea(child: WebView(initialUrl: '${{ github.event.inputs.web_url }}', javascriptMode: JavascriptMode.unrestricted)))));
          EOF
          
          # 3. Setup Icon & Build
          flutter pub add webview_flutter
          flutter pub get
          flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: my_app/build/app/outputs/flutter-apk/app-release.apk
