name: Flutter Web2APK Build

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'URL GitHub Repo'
        required: true
      branch:
        description: 'Branch'
        default: 'main'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          repository: ${{ github.event.inputs.repo_url }}
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Build APK Release
        run: |
          flutter pub get
          flutter build apk --release --split-per-abi # Mode release, ukuran leuwih leutik[span_1](start_span)[span_1](end_span)

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-release # Ngaran artifact kudu konsisten[span_2](start_span)[span_2](end_span)
          path: build/app/outputs/flutter-apk/app-release.apk # Jalur file release[span_3](start_span)[span_3](end_span)
