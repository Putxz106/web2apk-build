name: Web2APK Build

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: "Alamat Website"
        required: true
        type: string

      app_name:
        description: "Nama Aplikasi"
        required: true
        type: string

      icon_url:
        description: "URL Icon"
        required: false
        default: ""
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"

      - name: Install Dependencies
        run: flutter pub get

      - name: Show Inputs
        run: |
          echo "APP_NAME=${{ github.event.inputs.app_name }}"
          echo "WEB_URL=${{ github.event.inputs.web_url }}"
          echo "ICON_URL=${{ github.event.inputs.icon_url }}"

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}
          path: build/app/outputs/flutter-apk/app-release.apk
