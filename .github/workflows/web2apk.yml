name: Web2APK Build
on:
  workflow_dispatch:
    inputs:
      web_url:
        description: "Alamat situs web"
        required: true
      app_name:
        description: "Nama aplikasi"
        required: true
      icon_url:
        description: "URL ikon/logo"
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Pasang alat pendukung
        run: |
          set -e
          sudo apt update -y
          sudo apt install -y openjdk-17-jdk wget imagemagick

      - name: Buat struktur proyek Android
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
          APP_URL: ${{ github.event.inputs.web_url }}
          APP_ID: com.putxz.apk
        run: |
          mkdir -p android-project/app/src/main/java/${APP_ID//./\/}
          mkdir -p android-project/app/src/main/res/{values,mipmap-xxxhdpi}

          # build.gradle root
          cat > android-project/build.gradle <<'EOF'
buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath 'com.android.tools.build:gradle:8.1.0'
  }
}
allprojects {
  repositories {
    google()
    mavenCentral()
  }
}
EOF

          # build.gradle app
          cat > android-project/app/build.gradle <<EOF
plugins {
  id 'com.android.application'
}
android {
  namespace '${APP_ID}'
  compileSdk 34
  defaultConfig {
    applicationId "${APP_ID}"
    minSdk 24
    targetSdk 34
    versionCode 1
    versionName "1.0"
  }
  buildTypes {
    release {
      minifyEnabled false
    }
  }
  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}
dependencies {
  implementation 'androidx.appcompat:appcompat:1.6.1'
}
EOF

          # strings.xml
          cat > android-project/app/src/main/res/values/strings.xml <<EOF
<resources>
    <string name="app_name">${APP_NAME}</string>
</resources>
EOF

          # AndroidManifest.xml
          cat > android-project/app/src/main/AndroidManifest.xml <<EOF
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="${APP_ID}">
    <uses-permission android:name="android.permission.INTERNET" />
    <application
        android:label="@string/app_name"
        android:icon="@mipmap/ic_launcher"
        android:usesCleartextTraffic="true">
        <activity
            android:name=".MainActivity"
            android:exported="true">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
    </application>
</manifest>
EOF

          # MainActivity.java
          cat > android-project/app/src/main/java/${APP_ID//./\/}/MainActivity.java <<EOF
package ${APP_ID};

import android.os.Bundle;
import androidx.appcompat.app.AppCompatActivity;
import android.webkit.WebView;
import android.webkit.WebViewClient;

public class MainActivity extends AppCompatActivity {
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        WebView webView = new WebView(this);
        webView.getSettings().setJavaScriptEnabled(true);
        webView.getSettings().setDomStorageEnabled(true);
        webView.setWebViewClient(new WebViewClient());
        webView.loadUrl("${APP_URL}");
        setContentView(webView);
    }
}
EOF

          # Gradle wrapper
          mkdir -p android-project/gradle/wrapper
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradle/wrapper/gradle-wrapper.jar -O android-project/gradle/wrapper/gradle-wrapper.jar
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-bin.zip" > android-project/gradle/wrapper/gradle-wrapper.properties
          echo "org.gradle.jvmargs=-Xmx2048m" > android-project/gradle/gradle.properties

      - name: Unduh dan pasang ikon
        if: ${{ inputs.icon_url != '' }}
        env:
          ICON_URL: ${{ inputs.icon_url }}
        run: |
          wget -q --no-check-certificate -O icon.png "${ICON_URL}"
          convert icon.png -resize 512x512 android-project/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Bangun file APK
        run: |
          cd android-project
          chmod +x gradlew
          ./gradlew assembleRelease --no-build-cache --stacktrace

      - name: Simpan hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-apk
          path: android-project/app/build/outputs/apk/release/app-release.apk
