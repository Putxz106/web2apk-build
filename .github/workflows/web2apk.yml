name: Web2APK Build
on:
  workflow_dispatch:
    inputs:
      web_url:
        description: "Alamat situs web"
        required: true
      app_name:
        description: "Nama aplikasi"
        required: true
      icon_url:
        description: "URL ikon/logo"
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Pasang semua alat
        run: |
          set -e
          sudo apt update -y
          sudo apt install -y openjdk-17-jdk wget unzip imagemagick

      - name: Unduh template yang pasti ada
        run: |
          wget -q https://github.com/xphoenixz/simple-webview-apk/archive/refs/heads/main.zip -O template.zip
          unzip -q template.zip
          mv simple-webview-apk-main android-project

      - name: Sesuaikan nama & alamat web
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
          APP_URL: ${{ github.event.inputs.web_url }}
          APP_ID: com.putxz.apk
        run: |
          cd android-project
          sed -i "s|MyWebApp|$APP_NAME|g" app/src/main/res/values/strings.xml
          sed -i "s|https://contoh-situs.com|$APP_URL|g" app/src/main/java/com/example/webview/MainActivity.java
          sed -i "s|com.example.webview|$APP_ID|g" app/build.gradle
          sed -i "s|com.example.webview|$APP_ID|g" app/src/main/java/com/example/webview/MainActivity.java
          mkdir -p "app/src/main/java/$(echo $APP_ID | tr '.' '/')"
          mv app/src/main/java/com/example/webview/* "app/src/main/java/$(echo $APP_ID | tr '.' '/')/"

      - name: Pasang ikon kalau ada
        if: ${{ inputs.icon_url != '' }}
        env:
          ICON_URL: ${{ github.event.inputs.icon_url }}
        run: |
          cd android-project
          wget -q "$ICON_URL" -O icon.png
          convert icon.png -resize 512x512 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Bangun APK
        run: |
          cd android-project
          chmod +x gradlew
          ./gradlew assembleRelease --no-build-cache

      - name: Simpan hasil
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-apk
          path: android-project/app/build/outputs/apk/release/app-release.apk
