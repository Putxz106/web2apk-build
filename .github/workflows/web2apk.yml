name: Build Web2APK
on:
  workflow_dispatch: # Biar bisa di-run manual
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Update ke checkout@v4 untuk ngilangin warning Node.js
      - name: Checkout Code
        uses: actions/checkout@v4

      # Update setup-node ke v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download & Extract Template Android-SmartWebView
        run: |
          echo "Mengunduh template WebView terbaru..."
          # Menggunakan repo mgks yang aktif
          wget -O template.zip https://github.com/mgks/Android-SmartWebView/archive/refs/heads/master.zip
          
          echo "Mengekstrak file zip..."
          unzip -q template.zip
          
          # Cari nama folder hasil ekstraknya 
          DIR=$(find . -maxdepth 1 -type d -name "Android-SmartWebView-*")
          
          # Validasi kalau foldernya gagal dicari / master.zip nggak ada
          if [ -z "$DIR" ]; then
            echo "Template master tidak ditemukan! Mencoba branch main..."
            wget -O template.zip https://github.com/mgks/Android-SmartWebView/archive/refs/heads/main.zip
            unzip -q -o template.zip
            DIR=$(find . -maxdepth 1 -type d -name "Android-SmartWebView-*")
            
            if [ -z "$DIR" ]; then
              echo "Template benar-benar tidak ditemukan!"
              ls -la
              exit 1
            fi
          fi
          
          echo "Mengganti nama folder menjadi android-project..."
          mv "$DIR" android-project
          
          # Pastikan file berhasil dipindah
          ls -la android-project
          
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Rekomendasi Java buat build Android modern

      - name: Build APK (Gradle)
        run: |
          cd android-project
          
          # Note: Kalau lu punya script buat otomatis ngubah URL web-nya, taruh di sini
          # Contoh: sed -i 's/URL_LAMA/URL_BARU/g' app/src/main/assets/swv.properties
          
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Release
        uses: actions/upload-artifact@v4
        with:
          name: Web2APK-Build
          path: android-project/app/build/outputs/apk/debug/*.apk
