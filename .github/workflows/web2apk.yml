name: Web2APK Build
on:
  workflow_dispatch:
    inputs:
      web_url:
        description: "Alamat situs web"
        required: true
      app_name:
        description: "Nama aplikasi"
        required: true
      icon_url:
        description: "URL ikon/logo"
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Pasang alat
        run: sudo apt update -y && sudo apt install -y openjdk-17-jdk wget unzip imagemagick

      - name: Unduh template siap pakai yang pasti ada
        run: wget -q https://github.com/mgks/Android-WebView-App/archive/refs/heads/master.zip -O template.zip && unzip -q template.zip && mv Android-WebView-App-master android-project

      - name: Sesuaikan data
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
          APP_URL: ${{ github.event.inputs.web_url }}
          APP_ID: com.putxz.apk
        run: |
          cd android-project
          sed -i "s|Android WebView App|$APP_NAME|g" app/src/main/res/values/strings.xml
          sed -i "s|https://example.com|$APP_URL|g" app/src/main/java/com/mgks/webview/MainActivity.java
          sed -i "s|com.mgks.webview|$APP_ID|g" app/build.gradle
          sed -i "s|com.mgks.webview|$APP_ID|g" app/src/main/java/com/mgks/webview/MainActivity.java
          mkdir -p "app/src/main/java/$(echo $APP_ID | tr '.' '/')"
          mv app/src/main/java/com/mgks/webview/* "app/src/main/java/$(echo $APP_ID | tr '.' '/')/"

      - name: Pasang ikon
        if: ${{ inputs.icon_url != '' }}
        run: |
          cd android-project
          wget -q "${{ inputs.icon_url }}" -O icon.png
          convert icon.png -resize 512x512 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Build APK
        run: cd android-project && chmod +x gradlew && ./gradlew clean assembleRelease --no-build-cache

      - name: Simpan hasil
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-apk
          path: android-project/app/build/outputs/apk/release/app-release.apk
