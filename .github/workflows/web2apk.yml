name: Web2APK Build
on:
  workflow_dispatch:
    inputs:
      web_url:
        description: "Alamat situs web"
        required: true
      app_name:
        description: "Nama aplikasi"
        required: true
      icon_url:
        description: "URL ikon/logo"
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Build Web ke APK
        uses: ayoitsali/web-to-apk-action@v1.0.0
        with:
          app_name: ${{ github.event.inputs.app_name }}
          app_url: ${{ github.event.inputs.web_url }}
          icon_url: ${{ github.event.inputs.icon_url }}
          app_id: com.putxz.apk
          app_version: "1.0.0"
          app_version_code: "1"
          build_type: "release"

      - name: Simpan file APK
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-apk
          path: "*.apk"
