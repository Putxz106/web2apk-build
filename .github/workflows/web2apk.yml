name: Flutter Web2APK Build

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL File ZIP (.zip)'
        required: true
      app_name:
        description: 'Nama Aplikasi'
        required: true
      icon_url:
        description: 'URL Icon'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download & Extract Source
        run: |
          curl -L "${{ github.event.inputs.web_url }}" -o source.zip
          mkdir repo_code
          unzip source.zip -d repo_code

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Build APK Release
        run: |
          # Cari folder yang ada pubspec.yaml
          cd repo_code
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \;)
          cd $PROJECT_ROOT
          
          flutter pub get
          flutter build apk --release
          
          # Pindahkan file hasil build ke lokasi yang benar
          mkdir -p ../../build/app/outputs/flutter-apk/
          cp build/app/outputs/flutter-apk/app-release.apk ../../build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
