name: Flutter Web2APK Build

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Repo (Owner/Repo)'
        required: true
      app_name:
        description: 'Nama Aplikasi'
        required: true
      icon_url:
        description: 'URL Icon'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.web_url }}
          path: 'repo_code'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Build APK Release
        run: |
          # Cari lokasi pubspec.yaml supaya tidak error 'project root'
          cd repo_code
          find . -maxdepth 2 -name "pubspec.yaml" -exec dirname {} \; > root_path.txt
          PROJECT_ROOT=$(head -n 1 root_path.txt)
          cd $PROJECT_ROOT
          
          echo "Building from: $PROJECT_ROOT"
          flutter pub get
          flutter build apk --release
          
          # Pindahkan hasil build ke folder utama agar bisa di-upload
          mkdir -p ../build/app/outputs/flutter-apk/
          cp build/app/outputs/flutter-apk/app-release.apk ../build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
