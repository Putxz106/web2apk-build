name: Build APK
on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL file ZIP"
        required: false
      tag:
        description: "Nama versi"
        required: true
      build_type:
        description: "Jenis build"
        default: "release"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: "stable"
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/apk/release/*.apk
